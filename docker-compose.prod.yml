services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loganalyzer-backend
    restart: unless-stopped
    ports:
      - "9092:9092"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    environment:
      - LA_DOCKER_SOCKET=/var/run/docker.sock
      - LA_DOCKER_HOST_ALIAS=host.docker.internal
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9092/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loganalyzer-frontend
    restart: unless-stopped
    ports:
      - "4092:4092"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
