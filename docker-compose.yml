version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loganalyzer-backend
    restart: unless-stopped
    ports:
      - "9092:9092"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LA_DATABASE_URL=${LA_DATABASE_URL:-postgresql://loganalyzer_svc:changeme@host.docker.internal:5432/loganalyzer}
      - LA_DOCKER_SOCKET=/var/run/docker.sock
      - LA_DOCKER_HOST_ALIAS=host.docker.internal
      - LA_STANDUP_API_URL=http://host.docker.internal:9060
      - LA_STANDUP_API_KEY=${LA_STANDUP_API_KEY:-}
      - LA_QA_DASHBOARD_API_URL=http://host.docker.internal:9095
      - LA_QA_DASHBOARD_API_KEY=${LA_QA_DASHBOARD_API_KEY:-}
      - LA_GITHUB_TOKEN=${LA_GITHUB_TOKEN:-}
      - LA_LOG_COLLECT_INTERVAL_MINUTES=5
      - LA_LOG_RETENTION_DAYS=30
      - LA_DAILY_REPORT_HOUR=6
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9092/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loganalyzer-frontend
    restart: unless-stopped
    ports:
      - "4092:4092"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
